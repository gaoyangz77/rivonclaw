    <!-- stylized "d" bowl + stem -->
    <path d="M 312 168 L 312 344 L 286 344 L 286 324 Q 270 348 240 348 Q 204 348 180 322 Q 158 298 158 262 Q 158 226 180 202 Q 204 176 240 176 Q 270 176 286 200 L 286 168 L 312 168 Z M 238 322 Q 262 322 276 306 Q 290 290 290 262 Q 290 234 276 218 Q 262 202 238 202 Q 214 202 198 220 Q 184 236 184 262 Q 184 288 198 304 Q 214 322 238 322 Z"/>
  </g>

  <!-- Small "ai" accent dot, coral -->
  <circle cx="348" cy="356" r="16" fill="#d97757"/>
</svg>
