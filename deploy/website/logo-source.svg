<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Parchment background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#f5f4ed"/>

  <!-- Ring-based depth shadow (inner border) -->
  <rect x="8" y="8" width="496" height="496" rx="108" fill="none" stroke="#e8e6dc" stroke-width="2"/>

  <!-- Terracotta badge circle -->
  <circle cx="256" cy="256" r="168" fill="#c96442"/>

  <!-- Inner coral highlight -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#d97757" stroke-width="6" stroke-opacity="0.4"/>

  <!-- "d" monogram — warm ivory on terracotta -->
