# Data-server (OLAP) docker-compose — runs on the internal-only data-server box.
#
# Boundary: this host runs the analytical stack (ClickHouse, Vector, Grafana,
# Airflow, Tabix, plus MySQL for Airflow metadata/analytics and a dedicated
# Redis for Celery broker). OLTP services (mongodb, backend, nginx, certbot,
# OLTP redis) stay on main-server.
#
# Airflow DAGs that read MongoDB reach main-server over the internal LAN via
# the `mongodb` alias injected through extra_hosts below.
#
# Usage on data-server:
#   cd ~/rivonclaw/server && docker compose -f docker-compose.data-server.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: easyclaw-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required in server/.env}
      MYSQL_DATABASE: airflow
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required in server/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./telemetry/mysql/init-analytics.sql:/docker-entrypoint-initdb.d/01-init-analytics.sql:ro
      - ./telemetry/mysql/seed-dimensions.sql:/docker-entrypoint-initdb.d/02-seed-dimensions.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=1G
      --innodb_redo_log_capacity=2G
      --slow_query_log=ON
      --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:?MYSQL_USER is required in server/.env}", "-p${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - telemetry_network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: easyclaw-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required in server/.env}
      PMA_ABSOLUTE_URI: ${PMA_ABSOLUTE_URI:?PMA_ABSOLUTE_URI is required in server/.env}
    networks:
      - telemetry_network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:8.0-alpine
    container_name: easyclaw-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in server/.env}
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - telemetry_network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: easyclaw-clickhouse
    volumes:
      - ./telemetry/clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./telemetry/clickhouse/cs_events.sql:/docker-entrypoint-initdb.d/02-cs-events.sql:ro
      - ./telemetry/clickhouse/relay_events.sql:/docker-entrypoint-initdb.d/03-relay-events.sql:ro
      - ./telemetry/clickhouse/affiliate_model_events.sql:/docker-entrypoint-initdb.d/04-affiliate-model-events.sql:ro
      - ./telemetry/clickhouse/log-ttl.xml:/etc/clickhouse-server/config.d/log-ttl.xml:ro
      - ./data/clickhouse:/var/lib/clickhouse
    environment:
      TZ: UTC
      CLICKHOUSE_DB: easyclaw
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required in server/.env}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required in server/.env}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    restart: unless-stopped
    networks:
      - telemetry_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector:
    image: timberio/vector:latest-alpine
    container_name: easyclaw-vector
    command: ["--config", "/etc/vector/vector.toml"]
    ports:
      # Vector ingest port; main-server's nginx reverse-proxies /v1/* here
      # (see main-server nginx conf). Host binding exposed on data-server
      # LAN interface for smoke testing with curl data-server:8085/v1/...
      - "8085:8081"
    volumes:
      - ./telemetry/vector/vector.toml:/etc/vector/vector.toml:ro
      - ./data/vector:/var/lib/vector
    environment:
      TZ: UTC
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required in server/.env}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required in server/.env}
      RELAY_LOG_AUTH_TOKEN: ${RELAY_LOG_AUTH_TOKEN:-}
      ML_OPS_LOG_AUTH_TOKEN: ${ML_OPS_LOG_AUTH_TOKEN:-}
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - telemetry_network

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: easyclaw-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required in server/.env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required in server/.env}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?GRAFANA_ROOT_URL is required in server/.env}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_PROTOCOL: http
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required in server/.env}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required in server/.env}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required in server/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./telemetry/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - telemetry_network
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy

  tabix:
    image: spoonest/clickhouse-tabix-web-client
    container_name: easyclaw-tabix
    ports:
      - "8124:80"
    volumes:
      - ./telemetry/tabix/default.conf:/etc/nginx/sites-enabled/default:ro
    networks:
      - telemetry_network
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy

  airflow-init:
    build:
      context: ./telemetry/airflow
      dockerfile: Dockerfile
    container_name: easyclaw-airflow-init
    user: "0:0"
    environment:
      # AIRFLOW_UID=1000 is not in /etc/passwd of the airflow image, so docker
      # sets HOME=/ and python can't find /home/airflow/.local/lib/.../airflow.
      # scheduler/worker/webserver avoid this because their default entrypoint
      # writes a /etc/passwd entry for the current uid at startup. init
      # overrides entrypoint, so set HOME explicitly.
      HOME: /home/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Shanghai
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: mysql+mysqldb://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required in server/.env}@redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/dag_processor_manager
        chown -R ${AIRFLOW_UID:?AIRFLOW_UID is required in server/.env}:0 /opt/airflow/logs
        chmod g+rwX /opt/airflow/logs/dag_processor_manager
        chmod g+rw /opt/airflow/logs/dag_processor_manager/*.log 2>/dev/null || true
        gosu ${AIRFLOW_UID:?AIRFLOW_UID is required in server/.env}:0 airflow db migrate
        gosu ${AIRFLOW_UID:?AIRFLOW_UID is required in server/.env}:0 airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@easyclaw.local \
          --password ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required in server/.env} || true
    volumes:
      - ./telemetry/airflow/dags:/opt/airflow/dags
      - ./telemetry/airflow/logs:/opt/airflow/logs
      - ./telemetry/airflow/plugins:/opt/airflow/plugins
    networks:
      - telemetry_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    build:
      context: ./telemetry/airflow
      dockerfile: Dockerfile
    container_name: easyclaw-airflow-webserver
    user: "${AIRFLOW_UID:?AIRFLOW_UID is required in server/.env}:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Shanghai
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: mysql+mysqldb://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL:?AIRFLOW_BASE_URL is required in server/.env}
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required in server/.env}@redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      BACKEND_INTERNAL_BASE_URL: ${BACKEND_INTERNAL_BASE_URL:?BACKEND_INTERNAL_BASE_URL is required in server/.env}
      BACKEND_INTERNAL_STAGING_BASE_URL: ${BACKEND_INTERNAL_STAGING_BASE_URL:-}
      ETL_INTERNAL_TOKEN: ${ETL_INTERNAL_TOKEN:?ETL_INTERNAL_TOKEN is required in server/.env}
      EXCHANGE_RATE_SOURCE: ${EXCHANGE_RATE_SOURCE:-FRANKFURTER}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL:-}
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs/dag_processor_manager
        chmod g+rwX /opt/airflow/logs/dag_processor_manager
        chmod g+rw /opt/airflow/logs/dag_processor_manager/*.log 2>/dev/null || true
        exec airflow webserver
    ports:
      - "8082:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./telemetry/airflow/dags:/opt/airflow/dags
      - ./telemetry/airflow/logs:/opt/airflow/logs
      - ./telemetry/airflow/plugins:/opt/airflow/plugins
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/airflow/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - telemetry_network
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./telemetry/airflow
      dockerfile: Dockerfile
    container_name: easyclaw-airflow-scheduler
    user: "${AIRFLOW_UID:?AIRFLOW_UID is required in server/.env}:0"
    # mongodb alias -> main-server: DAGs keep using the mongodb://...@mongodb:27017/...
    # URI they use on main-server; extra_hosts injects the LAN hostname here.
    extra_hosts:
      - "mongodb:${MONGO_HOST_IP:?MONGO_HOST_IP is required in server/.env}"
      - "main-server:${MAIN_SERVER_IP:?MAIN_SERVER_IP is required in server/.env}"
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Shanghai
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: mysql+mysqldb://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required in server/.env}@redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required in server/.env}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required in server/.env}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required in server/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}
      MONGODB_URI: mongodb://${MONGO_USER:?MONGO_USER is required in server/.env}:${MONGO_PASSWORD:?MONGO_PASSWORD is required in server/.env}@mongodb:27017/easyclaw?authSource=admin
      BACKEND_INTERNAL_BASE_URL: ${BACKEND_INTERNAL_BASE_URL:?BACKEND_INTERNAL_BASE_URL is required in server/.env}
      BACKEND_INTERNAL_STAGING_BASE_URL: ${BACKEND_INTERNAL_STAGING_BASE_URL:-}
      ETL_INTERNAL_TOKEN: ${ETL_INTERNAL_TOKEN:?ETL_INTERNAL_TOKEN is required in server/.env}
      LLM_API_BASE: ${LLM_API_BASE:?LLM_API_BASE is required in server/.env}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY is required in server/.env}
      LLM_MODEL: ${LLM_MODEL:?LLM_MODEL is required in server/.env}
      EXCHANGE_RATE_SOURCE: ${EXCHANGE_RATE_SOURCE:-FRANKFURTER}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL:-}
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs/dag_processor_manager
        chmod g+rwX /opt/airflow/logs/dag_processor_manager
        chmod g+rw /opt/airflow/logs/dag_processor_manager/*.log 2>/dev/null || true
        exec airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./telemetry/airflow/dags:/opt/airflow/dags
      - ./telemetry/airflow/logs:/opt/airflow/logs
      - ./telemetry/airflow/plugins:/opt/airflow/plugins
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - telemetry_network
    restart: unless-stopped

  airflow-worker:
    build:
      context: ./telemetry/airflow
      dockerfile: Dockerfile
    container_name: easyclaw-airflow-worker
    user: "${AIRFLOW_UID:?AIRFLOW_UID is required in server/.env}:0"
    extra_hosts:
      - "mongodb:${MONGO_HOST_IP:?MONGO_HOST_IP is required in server/.env}"
      - "main-server:${MAIN_SERVER_IP:?MAIN_SERVER_IP is required in server/.env}"
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Shanghai
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: mysql+mysqldb://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required in server/.env}@redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://${MYSQL_USER:?MYSQL_USER is required in server/.env}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}@mysql:3306/airflow
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required in server/.env}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required in server/.env}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required in server/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}
      MONGODB_URI: mongodb://${MONGO_USER:?MONGO_USER is required in server/.env}:${MONGO_PASSWORD:?MONGO_PASSWORD is required in server/.env}@mongodb:27017/easyclaw?authSource=admin
      BACKEND_INTERNAL_BASE_URL: ${BACKEND_INTERNAL_BASE_URL:?BACKEND_INTERNAL_BASE_URL is required in server/.env}
      BACKEND_INTERNAL_STAGING_BASE_URL: ${BACKEND_INTERNAL_STAGING_BASE_URL:-}
      ETL_INTERNAL_TOKEN: ${ETL_INTERNAL_TOKEN:?ETL_INTERNAL_TOKEN is required in server/.env}
      LLM_API_BASE: ${LLM_API_BASE:?LLM_API_BASE is required in server/.env}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY is required in server/.env}
      LLM_MODEL: ${LLM_MODEL:?LLM_MODEL is required in server/.env}
      EXCHANGE_RATE_SOURCE: ${EXCHANGE_RATE_SOURCE:-FRANKFURTER}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL:-}
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs/dag_processor_manager
        chmod g+rwX /opt/airflow/logs/dag_processor_manager
        chmod g+rw /opt/airflow/logs/dag_processor_manager/*.log 2>/dev/null || true
        exec airflow celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./telemetry/airflow/dags:/opt/airflow/dags
      - ./telemetry/airflow/logs:/opt/airflow/logs
      - ./telemetry/airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:?DOCKER_GID is required in server/.env}"
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - telemetry_network
    restart: unless-stopped

  affiliate-p50-sales:
    build:
      context: ./telemetry/bentoml/affiliate_p50_sales
      dockerfile: Dockerfile
    container_name: easyclaw-affiliate-p50-sales
    ports:
      - "3010:3000"
    environment:
      BENTOML_HOME: /home/bentoml/bentoml
      AFFILIATE_P50_MODEL_TAG: ${AFFILIATE_P50_MODEL_TAG:-}
      AFFILIATE_FEATURE_VERSION: ${AFFILIATE_FEATURE_VERSION:-structured_v1}
      AFFILIATE_DECISION_MIN_P50_UNITS: ${AFFILIATE_DECISION_MIN_P50_UNITS:-2}
      AFFILIATE_P50_THRESHOLDS: ${AFFILIATE_P50_THRESHOLDS:-1,2,3,5,10}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required in server/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required in server/.env}
      MYSQL_ANALYTICS_DATABASE: easyclaw_analytics
      VECTOR_LOG_URL: http://vector:8081/v1/ml-ops
      VECTOR_LOG_AUTH_TOKEN: ${ML_OPS_LOG_AUTH_TOKEN:-}
    volumes:
      - ./data/bentoml:/home/bentoml/bentoml
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - telemetry_network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

networks:
  telemetry_network:
    driver: bridge
