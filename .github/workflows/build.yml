name: Build & Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Clone OpenClaw vendor
        shell: bash
        run: |
          HASH=$(tr -d '[:space:]' < .openclaw-version)
          git clone https://github.com/openclaw/openclaw.git vendor/openclaw
          cd vendor/openclaw
          git checkout "$HASH"
          git checkout -B main

      - name: Cache vendor node_modules
        id: cache-vendor-nm
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/node_modules
          key: vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor/openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-

      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      # Post-prune cache: contains the production-ready dist/, pruned
      # node_modules, modified .gitignore, and stripped dist-runtime/ after
      # prune-vendor-deps.cjs has run. When this hits, prune sees .pruned
      # marker and skips, saving ~2-5 min per build.
      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs', 'apps/desktop/scripts/archive-vendor-runtime.cjs', 'apps/desktop/scripts/stage-official-vendor-plugins.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build Windows app
        shell: pwsh
        run: |
          cd apps/desktop
          if ($env:AZURE_TENANT_ID -and $env:AZURE_CLIENT_ID -and $env:AZURE_CLIENT_SECRET) {
            pnpm run dist:win
          } else {
            Write-Warning "Azure Artifact Signing secrets are not configured; building unsigned Windows artifacts."
            pnpm run dist:win:unsigned
          }
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Verify Windows signatures
        shell: pwsh
        run: |
          if (-not ($env:AZURE_TENANT_ID -and $env:AZURE_CLIENT_ID -and $env:AZURE_CLIENT_SECRET)) {
            Write-Warning "Skipping Windows signature verification because Azure Artifact Signing secrets are not configured."
            exit 0
          }

          $files = Get-ChildItem -Path apps/desktop/release -Filter *.exe
          if (-not $files) {
            throw "No Windows .exe artifacts found."
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            Write-Host "$($file.Name): $($signature.Status) $($signature.SignerCertificate.Subject)"

            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $($file.FullName): $($signature.Status)"
            }
          }
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Verify Windows vendor prune
        shell: pwsh
        run: |
          $vendor = "apps/desktop/release/win-unpacked/resources/vendor/openclaw"
          if (-not (Test-Path $vendor)) {
            throw "Windows unpacked vendor directory not found: $vendor"
          }
          if (-not (Test-Path "$vendor/node_modules")) {
            throw "Windows vendor node_modules missing after packaging."
          }
          foreach ($requiredPath in @(
            "$vendor/node_modules/highlight.js"
          )) {
            if (-not (Test-Path $requiredPath)) {
              throw "Required runtime package is missing from Windows artifact: $requiredPath"
            }
          }
          foreach ($removedPath in @(
            "$vendor/node_modules/@openai/codex",
            "$vendor/node_modules/@tloncorp/tlon-skill",
            "$vendor/node_modules/@zed-industries/codex-acp",
            "$vendor/node_modules/@anthropic-ai/claude-agent-sdk"
          )) {
            if (Test-Path $removedPath) {
              throw "Pruned vendor path is present in Windows artifact: $removedPath"
            }
          }
          foreach ($requiredPath in @(
            "$vendor/dist/extensions/acpx/openclaw.plugin.json",
            "$vendor/dist/extensions/memory-core/openclaw.plugin.json",
            "$vendor/extensions/openclaw-lark/openclaw.plugin.json",
            "$vendor/node_modules/@larksuiteoapi/node-sdk/package.json",
            "$vendor/node_modules/openclaw/package.json",
            "$vendor/docs/reference/templates/AGENTS.md",
            "$vendor/docs/reference/templates/SOUL.md",
            "$vendor/docs/reference/templates/TOOLS.md"
          )) {
            if (-not (Test-Path $requiredPath)) {
              throw "Required runtime file is missing from Windows artifact: $requiredPath"
            }
          }
          node apps/desktop/scripts/verify-vendor-runtime-contract.cjs --vendor "$vendor"
          $sizeBytes = (Get-ChildItem -Path $vendor -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $sizeMB = [math]::Round($sizeBytes / 1MB, 1)
          Write-Host "Windows vendor payload: ${sizeMB}MB"
          if ($sizeMB -gt 1000) {
            throw "Windows vendor payload is too large after prune: ${sizeMB}MB"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-installers
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          retention-days: 1

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Clone OpenClaw vendor
        run: |
          HASH=$(tr -d '[:space:]' < .openclaw-version)
          git clone https://github.com/openclaw/openclaw.git vendor/openclaw
          cd vendor/openclaw
          git checkout "$HASH"
          git checkout -B main

      - name: Cache vendor node_modules
        id: cache-vendor-nm
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/node_modules
          key: vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor/openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-

      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs', 'apps/desktop/scripts/archive-vendor-runtime.cjs', 'apps/desktop/scripts/stage-official-vendor-plugins.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Verify macOS signing secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACOS_KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$MACOS_CERTIFICATE" || { echo "MACOS_CERTIFICATE is required"; exit 1; }
          test -n "$MACOS_CERTIFICATE_PWD" || { echo "MACOS_CERTIFICATE_PWD is required"; exit 1; }
          test -n "$KEYCHAIN_PASSWORD" || { echo "KEYCHAIN_PASSWORD is required"; exit 1; }
          test -n "$APPLE_ID" || { echo "APPLE_ID is required"; exit 1; }
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || { echo "APPLE_APP_SPECIFIC_PASSWORD is required"; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "APPLE_TEAM_ID is required"; exit 1; }

      - name: Import Code Signing Certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACOS_KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$MACOS_KEYCHAIN_PATH"
          security list-keychains -d user -s "$MACOS_KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -s "$MACOS_KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$MACOS_KEYCHAIN_PATH"
          curl -fsSL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o developer-id-g2.cer
          security import developer-id-g2.cer -k "$MACOS_KEYCHAIN_PATH" -T /usr/bin/codesign
          security import certificate.p12 -k "$MACOS_KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$MACOS_KEYCHAIN_PATH"
          security find-identity -v -p codesigning
          rm -f certificate.p12 developer-id-g2.cer

      - name: Build macOS arm64 DMG + ZIP
        timeout-minutes: 240
        run: |
          cd apps/desktop
          export PATH="$PWD/scripts/ci-bin:$PATH"
          pnpm run dist:mac:arm64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
          CSC_KEYCHAIN: ${{ runner.temp }}/build.keychain-db
          RIVONCLAW_MAC_RUNTIME_ARCH: arm64
          NOTARIZE_TIMEOUT_SECONDS: "7200"
          CODESIGN_TIMEOUT_SECONDS: "1800"
          DEBUG: electron-notarize:*

      - name: Validate macOS bundle
        run: |
          APP=$(find apps/desktop/release -name "*.app" -maxdepth 3 | head -1)
          VENDOR="$APP/Contents/Resources/vendor/openclaw"
          # Must have archive
          test -f "$VENDOR/vendor-runtime.tar" || { echo "FAIL: archive missing"; exit 1; }
          # Must NOT have node_modules
          test ! -d "$VENDOR/node_modules" || { echo "FAIL: exploded node_modules in bundle"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^node_modules/highlight.js/package.json$' || { echo "FAIL: highlight.js missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^docs/reference/templates/AGENTS.md$' || { echo "FAIL: AGENTS.md template missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^docs/reference/templates/SOUL.md$' || { echo "FAIL: SOUL.md template missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^docs/reference/templates/TOOLS.md$' || { echo "FAIL: TOOLS.md template missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^dist/extensions/acpx/openclaw.plugin.json$' || { echo "FAIL: acpx manifest missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^dist/extensions/memory-core/openclaw.plugin.json$' || { echo "FAIL: memory-core manifest missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^extensions/openclaw-lark/openclaw.plugin.json$' || { echo "FAIL: openclaw-lark manifest missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^node_modules/@larksuiteoapi/node-sdk/package.json$' || { echo "FAIL: lark sdk dependency missing from vendor archive"; exit 1; }
          tar -tf "$VENDOR/vendor-runtime.tar" | grep -q '^node_modules/openclaw/package.json$' || { echo "FAIL: openclaw sdk shim missing from vendor archive"; exit 1; }
          node apps/desktop/scripts/verify-vendor-runtime-contract.cjs --archive "$VENDOR/vendor-runtime.tar"
          FILE_COUNT=$(find "$VENDOR" -type f | wc -l)
          echo "Vendor dir: $FILE_COUNT files"
          test "$FILE_COUNT" -le 10 || { echo "FAIL: >10 files in vendor dir"; exit 1; }
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl -a -vvv --type exec "$APP"
          echo "PASS"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64-installers
          path: |
            apps/desktop/release/*-arm64*.dmg
            apps/desktop/release/*-arm64*.zip
            apps/desktop/release/*-arm64*.blockmap
          retention-days: 1

      - name: Rename update manifest for arm64
        run: mv apps/desktop/release/latest-mac.yml apps/desktop/release/arm64-mac.yml

      - name: Upload update metadata
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64-update-meta
          path: apps/desktop/release/arm64-mac.yml
          retention-days: 1

