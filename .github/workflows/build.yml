        uses: actions/upload-artifact@v6
        with:
          name: macos-x64-update-meta
          path: apps/desktop/release/x64-mac.yml
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Clone OpenClaw vendor
        run: |
          HASH=$(tr -d '[:space:]' < .openclaw-version)
          git clone https://github.com/openclaw/openclaw.git vendor/openclaw
          cd vendor/openclaw
          git checkout "$HASH"
          git checkout -B main

      - name: Cache vendor node_modules
        id: cache-vendor-nm
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/node_modules
          key: vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor/openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-

      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      # Post-prune cache: contains the production-ready dist/, pruned
      # node_modules, modified .gitignore, and stripped dist-runtime/ after
      # prune-vendor-deps.cjs has run. When this hits, prune sees .pruned
      # marker and skips, saving ~2-5 min per build.
      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs', 'apps/desktop/scripts/archive-vendor-runtime.cjs', 'apps/desktop/scripts/stage-official-vendor-plugins.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build Linux app
        run: |
          cd apps/desktop
          pnpm run dist:linux

      - name: Verify Linux vendor prune
        run: |
          VENDOR="apps/desktop/release/linux-unpacked/resources/vendor/openclaw"
          test -d "$VENDOR" || { echo "Linux unpacked vendor directory not found: $VENDOR"; exit 1; }
          test -d "$VENDOR/node_modules" || { echo "Linux vendor node_modules missing after packaging."; exit 1; }
          for path in \
            "$VENDOR/node_modules/highlight.js"
          do
            test -e "$path" || { echo "Required runtime package is missing from Linux artifact: $path"; exit 1; }
          done
          for path in \
            "$VENDOR/node_modules/@openai/codex" \
            "$VENDOR/node_modules/@tloncorp/tlon-skill" \
            "$VENDOR/node_modules/@zed-industries/codex-acp" \
            "$VENDOR/node_modules/@anthropic-ai/claude-agent-sdk"
          do
            test ! -e "$path" || { echo "Pruned vendor path is present in Linux artifact: $path"; exit 1; }
          done
          for path in \
            "$VENDOR/dist/extensions/acpx/openclaw.plugin.json" \
            "$VENDOR/dist/extensions/memory-core/openclaw.plugin.json" \
            "$VENDOR/extensions/openclaw-lark/openclaw.plugin.json" \
            "$VENDOR/node_modules/@larksuiteoapi/node-sdk/package.json" \
            "$VENDOR/node_modules/openclaw/package.json" \
            "$VENDOR/docs/reference/templates/AGENTS.md" \
            "$VENDOR/docs/reference/templates/SOUL.md" \
            "$VENDOR/docs/reference/templates/TOOLS.md"
          do
            test -e "$path" || { echo "Required runtime file is missing from Linux artifact: $path"; exit 1; }
          done
          node apps/desktop/scripts/verify-vendor-runtime-contract.cjs --vendor "$VENDOR"
          SIZE_MB=$(du -sm "$VENDOR" | awk '{print $1}')
          echo "Linux vendor payload: ${SIZE_MB}MB"
          test "$SIZE_MB" -le 1000 || { echo "Linux vendor payload is too large after prune: ${SIZE_MB}MB"; exit 1; }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-installers
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
            apps/desktop/release/*.deb
            apps/desktop/release/latest-linux.yml
          retention-days: 1

  create-release:
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v6
        with:
          name: windows-installers
          path: artifacts/windows

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v6
        with:
          name: macos-arm64-installers
          path: artifacts/macos

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v6
        with:
          name: macos-x64-installers
          path: artifacts/macos

      - name: Download macOS arm64 update metadata
        uses: actions/download-artifact@v6
        with:
          name: macos-arm64-update-meta
          path: artifacts/macos

      - name: Download macOS x64 update metadata
        uses: actions/download-artifact@v6
        with:
          name: macos-x64-update-meta
          path: artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v6
        with:
          name: linux-installers
          path: artifacts/linux

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Delete existing draft release for this tag (if re-running workflow)
          if gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null | grep -q true; then
            echo "Deleting existing draft release $TAG..."
            gh release delete "$TAG" --yes
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

          # Generate release notes from changelog.json + install instructions
          VERSION="${{ steps.version.outputs.version }}"
          node scripts/generate-release-notes.mjs "$VERSION" /tmp/release-notes.md

          # Create the draft release with release notes and all artifacts
          gh release create "$TAG" \
            --title "RivonClaw $TAG" \
            --notes-file /tmp/release-notes.md \
            --draft \
            artifacts/windows/* \
            artifacts/macos/* \
            artifacts/linux/*

          echo "Draft release $TAG created with all artifacts."
