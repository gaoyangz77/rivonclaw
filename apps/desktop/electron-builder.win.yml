# Windows-specific electron-builder configuration
# Extends the base electron-builder.yml (created by W6-A)
# Usage: electron-builder --win --config electron-builder.win.yml

extends: electron-builder.yml

win:
  icon: build/icon
  # Azure Artifact Signing (formerly Trusted Signing) signs during packaging so
  # NSIS blockmaps and latest.yml are generated from the signed artifacts.
  # CI must provide AZURE_TENANT_ID, AZURE_CLIENT_ID, and AZURE_CLIENT_SECRET
  # for a principal with the Artifact Signing Certificate Profile Signer role.
  azureSignOptions:
    publisherName: RIVON LLC
    endpoint: https://eus.codesigning.azure.net
    codeSigningAccountName: rivonclaw-signing
    certificateProfileName: rivonclaw-public-trust
    fileDigest: SHA256
    timestampRfc3161: http://timestamp.acs.microsoft.com
    timestampDigest: SHA256

  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

nsis:
  artifactName: "${productName}.Setup.${version}.${ext}"
  include: "installer.nsh"
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerSidebar: build/installerSidebar.png
  uninstallDisplayName: "RivonClaw"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "RivonClaw"
  # Simplified to single language to avoid NSIS language detection issues
  # Multi-language support can be re-enabled after verifying language codes
  # installerLanguages:
  #   - English
  #   - SimpChinese
  # language: 0409
  # multiLanguageInstaller: true
