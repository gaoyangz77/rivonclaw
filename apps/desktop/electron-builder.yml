appId: com.easyclaw.desktop
productName: RivonClaw

directories:
  output: release

files:
  - dist/**
  - build/trayIcon.png
  - build/trayIcon@2x.png
  - changelog.json
  - node_modules/**
  - "!node_modules/**/test_extension.node"
  - package.json

extraMetadata:
  main: dist/main.cjs
  type: commonjs

asar: true
icon: build/icon

# Files copied outside asar into Contents/Resources/
extraResources:
  # OpenClaw CLI launcher and thin shims. Runtime shims are installed into
  # user PATH by Desktop on startup and by the Windows installer.
  - from: "cli"
    to: "cli"
    filter:
      - "openclaw-launcher.cjs"
  # OpenClaw vendor runtime — must be outside asar (runs as a separate Node.js process)
  - from: "../../vendor/openclaw"
    to: "vendor/openclaw"
    filter:
      - "openclaw.mjs"
      - "package.json"
      - "vendor-runtime.tar"
      - "vendor-runtime-manifest.json"
      - "docs/reference/templates/**"
      - "dist/**"
      - "!.git"
      - "!.git/**"
      - "!**/.git"
      - "!**/.git/**"
      - "!dist/**/node_modules/**"
      - "dist-runtime/**"
      - "!dist-runtime/**/node_modules/**"
      - "extensions/**"
      - "!extensions/**/node_modules/**"
      - "!CLAUDE.md"
      - "!AGENTS.md"
      - "!dist/**/CLAUDE.md"
      - "!dist/**/AGENTS.md"
      - "!dist-runtime/**/CLAUDE.md"
      - "!dist-runtime/**/AGENTS.md"
      - "!extensions/**/CLAUDE.md"
      - "!extensions/**/AGENTS.md"
  # RivonClaw extensions — auto-discovered by OpenClaw at runtime
  - from: "../../extensions"
    to: "extensions"
    filter:
      - "**"
      - "!.git"
      - "!.git/**"
      - "!**/.git"
      - "!**/.git/**"
      - "!**/node_modules/**"
  # Private merchant extensions (may not exist in open-source builds)
  - from: "../../extensions-merchant"
    to: "extensions-merchant"
    filter:
      - "**"
      - "!.git"
      - "!.git/**"
      - "!**/.git"
      - "!**/.git/**"
      - "!**/node_modules/**"
      - "!**/.turbo/**"
      - "!**/src/**"
      - "!**/test/**"
      - "!**/tsconfig*.json"
      - "!**/tsdown.config.*"
      - "!**/vitest.config.*"
      - "!**/*.map"
      - "!*.md"
      - "!**/README.md"
  # Volcengine STT CLI bridge script (not natively supported in OpenClaw).
  # Copied to resources root so main.ts can resolve it via process.resourcesPath.
  - from: "../../packages/gateway/dist"
    to: "."
    filter:
      - "volcengine-stt-cli.mjs"
  # Panel UI static files
  - from: "../panel/dist"
    to: "panel-dist"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  extendInfo:
    LSUIElement: true
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  # CI imports a Developer ID Application certificate into a temporary
  # keychain; electron-builder auto-discovers it for release signing.
  # Skip signing files that can't be signed (vendor binaries with
  # unsupported formats, git objects, etc.)
  # Note: vendor/openclaw/node_modules is no longer in the bundle — macOS ships
  # the vendor runtime as a single tar archive (extracted on first launch).
  signIgnore:
    - "extensions-merchant"
  notarize: false
  artifactName: "${productName}-${version}-${arch}.${ext}"
dmg:
  background: build/dmg-background.png
  iconSize: 80
  window:
    width: 590
    height: 380
  contents:
    - x: 155
      y: 200
    - x: 435
      y: 200
      type: link
      path: /Applications

publish:
  - provider: generic
    url: https://www.rivonclaw.com/releases/

afterPack: scripts/copy-vendor-deps.cjs
afterSign: scripts/notarize.cjs
